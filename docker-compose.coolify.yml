# Docker Compose para deploy no Coolify (produção)
# Uso: configure no Coolify apontando para este arquivo
#
# Variáveis obrigatórias no Coolify (copie do .env de produção):
#   APP_KEY, APP_URL, DB_*, REDIS_*, STRIPE_*, SENTRY_*, etc.

x-app-env: &app-env
  APP_NAME: ${APP_NAME:-DOPACheck}
  APP_ENV: production
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_KEY: ${APP_KEY}
  APP_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
  APP_URL: ${APP_URL}
  APP_LOCALE: ${APP_LOCALE:-pt_BR}
  APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
  APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-pt_BR}

  LOG_CHANNEL: ${LOG_CHANNEL:-stack}
  LOG_STACK: ${LOG_STACK:-single}
  LOG_LEVEL: ${LOG_LEVEL:-info}

  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_DATABASE: ${DB_DATABASE}
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}

  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}

  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis
  SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
  HORIZON_PREFIX: ${HORIZON_PREFIX:-dopacheck}

  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
  AWS_BUCKET: ${AWS_BUCKET:-}
  AWS_ENDPOINT: ${AWS_ENDPOINT:-}
  AWS_URL: ${AWS_URL:-}
  AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}

  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST:-}
  MAIL_PORT: ${MAIL_PORT:-587}
  MAIL_USERNAME: ${MAIL_USERNAME:-}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-DOPA Check}

  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}

  STRIPE_KEY: ${STRIPE_KEY:-}
  STRIPE_SECRET: ${STRIPE_SECRET:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  STRIPE_PRICE_PRO_MONTHLY: ${STRIPE_PRICE_PRO_MONTHLY:-}
  STRIPE_PRICE_PRO_YEARLY: ${STRIPE_PRICE_PRO_YEARLY:-}
  DOPA_PRO_PRICE_MONTHLY: ${DOPA_PRO_PRICE_MONTHLY:-}
  DOPA_PRO_PRICE_YEARLY: ${DOPA_PRO_PRICE_YEARLY:-}

  SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}

  EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
  EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
  EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-}

  OCTANE_SERVER: frankenphp
  RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
  TZ: ${TZ:-America/Sao_Paulo}

x-app-volumes: &app-volumes
  - storage_data:/app/storage
  - bootstrap_cache:/app/bootstrap/cache

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      <<: *app-env
    volumes: *app-volumes
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
    volumes: *app-volumes
    command: php artisan horizon
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "false"
    volumes: *app-volumes
    command: php artisan schedule:work
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  storage_data:
  bootstrap_cache:
  mysql_data:
  redis_data:
