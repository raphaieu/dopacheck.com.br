; Production PHP settings for FrankenPHP/Octane
memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 60
max_input_time = 60

; Opcache (Octane keeps workers alive — opcache is essential)
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0

; Realpath cache
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Error handling (APP_DEBUG controls display)
display_errors = Off
display_startup_errors = Off
log_errors = On

; Session driver is configured via Laravel (.env SESSION_DRIVER=redis)
